        - Encrypted backup sent to Sarah Mendoza (attorney)

        THE FRAUD:
        James Morrison (CEO) and Liam Keller (CFO) have been stealing money from the Meridian Project for 18 months.
        Total amount stolen: $47.3 million

        How they did it:
        1. Created fake vendor companies in the Cayman Islands (Helix Solutions Ltd, Meridian Technical Services, Apex Consulting Group)
        2. Submitted fake invoices for "consulting services" that never happened
        3. Approved the invoices themselves (no oversight)
        4. Wired money to Cayman accounts they control
        5. Transferred money from Cayman accounts to personal accounts in Switzerland and Singapore

        WHO KNOWS:
        - James Morrison - CEO, orchestrated everything
        - Liam Keller - CFO, executed the transfers
        - Thomas Wright - Board member, received kickbacks ($2.1M)
        - Elena Vasquez - Finance Director, helped create fake invoices (she's scared, might flip)

        WHO I TOLD:
        - Marcus Tate - He's helping me. He has copies of everything. He used to work in forensic accounting. He's the only one I trust.
        - Rachel Kim - In-house counsel. She can't help directly but she gave me a lawyer referral.
        - Sophie Rodriguez - She knows something is wrong but doesn't have details. She's scared.

        WHAT I DID:
        Thursday 10:52 PM - Sent formal whistleblower complaint to board with all evidence attached
        Thursday 11:08 PM - James responded, threatened me, fired me
        Thursday 11:29 PM - Got anonymous threatening voicemail
        Thursday 11:36 PM - Liam called, I didn't answer
        Thursday 11:40 PM - Liam showed up at my apartment

        WHAT HAPPENED NEXT:
        I told Liam to leave. He wouldn't. He said I was "making a huge mistake" and that I "didn't understand what I was dealing with."
        He said if I didn't retract the email and sign an NDA, "things would get very difficult for me."
        I told him I wasn't retracting anything and I was going to the SEC.
        He got angry. Really angry. He said "You have no idea who you're fucking with."
        Then he left.
        I'm scared.
        I called Marcus. He's coming over tomorrow morning to help me figure out next steps.
        If something happens to me, it wasn't an accident.

        EVIDENCE LOCATIONS:
        1. Google Drive - "Personal Backup - DO NOT DELETE" folder
        2. Flash Drive - Hidden in apartment (Bedroom closet, behind loose baseboard on left side)
        3. Attorney - Sarah Mendoza, Mendoza & Partners LLP
        4. Marcus Tate - He has everything

        FOLLOW THE MONEY:
        Helix Solutions Ltd (Cayman) -> UBS Switzerland Account #CH93-0076-2011-6238-5295-7 -> James Morrison personal account
        Meridian Technical Services (Cayman) -> DBS Singapore Account #7171-23-45678 -> Liam Keller personal account
        Apex Consulting Group (Cayman) -> Credit Suisse Account #0254-1234567-89 -> Thomas Wright personal account

        THE SMOKING GUN:
        Email from James to Liam (September 14, 2023):
        "Helix payment cleared. $8.2M in the Swiss account. Let's keep the board distracted with the product roadmap presentation. Nobody's looking at vendor payments."
        I have the original email. It's in the Google Drive.

        TO WHOEVER FINDS THIS:
        Go to the SEC. Go to the FBI. Go to the press.
        Don't trust anyone at Axiom except maybe Sophie and Rachel.
        Marcus will help you. He's a good person.
        I'm sorry I got into this mess.
        I just wanted to do the right thing.
        - Maya

        2. Flash drive hidden in my apartment (closet baseboard)
        3. Flash drive hidden at Fort Point - buried under the third stone from the left at the base of the western wall, near the water
        Nobody knows about #3 except me.
        If I die, someone needs to find it.
      locked: true
      hint: 'The night we became real friends'
      password: '041642'
    - id: 'jordan'
      title: 'Things to tell Jordan'
      content: |
        Created: Monday, November 13th, 11:47 PM
        Last Modified: Tuesday, November 14th, 2:34 AM

        Jordan—

        If you're reading this, something went wrong.

        I know we haven't talked in months. I know I've been distant. But you're the only person I trust who isn't tangled up in this mess.

        Three weeks ago, I found something at work. Financial records that don't add up. Money disappearing into shell companies. James (my CEO) has been stealing from the company for almost a year.

        I confronted him. He denied everything. Then he started making my life hell—undermining me in meetings, questioning my work, making me look incompetent in front of the board.

        I have proof. It's in my notes (password protected—you'll figure it out, you always were better at puzzles than me).

        But here's the thing: I don't think James is working alone.
        Someone at the company is helping him. Someone I trusted. And I think they know that I know.

        I've been getting weird calls. Unknown numbers. Heavy breathing. Hang-ups. My apartment building's security camera caught someone trying my door handle at 3 AM last Tuesday.

        I'm scared, Jordan.

        I reported everything to the board Thursday night. Sent the email with all the evidence. But now I'm wondering if that was a mistake.

        If something happens to me, please don't let them say it was an accident.
        Please don't let them win.

        The password to my locked notes is something only you would know. Remember sophomore year? The night we got locked out of our dorm and had to sleep in the library? You made me promise I'd never forget that date because it was "the night we became real friends."

        I never forgot.

        I'm sorry I disappeared. I'm sorry I didn't call you back in August when you texted about your mom. I'm sorry I've been a shitty friend.

        But I need you now.

        Please find the truth.

        —M
      locked: false

