story:
  id: "the_echo_of_the_bell"
  title: "The Echo of the Bell"
  version: "3.0"
  description: "A multi-act psychological thriller. Every step you take is watched by RAS. Every sound you hear is a lie. Uncover the truth behind Mira's disappearance within the walls of Ravenport University."
  
  personaKnowledge:
    david:
      unlocked:
        - maya_sister_careful
        - police_closing_case
      locked:
        - dad_proposal_fort_point: "Maya used to go to Fort Point to think because it's where our dad proposed to our mom."
        - maya_shut_me_out: "Maya shut me out recently, claiming she didn't want me to worry. We weren't close since Mom got sick."

  currentObjectives:
    - id: "find_maya_password"
      description: "Find the password to Maya's locked notes."
      hint: "Jordan and Maya sleepover?"
    - id: "investigate_fort_point"
      description: "Ask why Maya went to Fort Point."

