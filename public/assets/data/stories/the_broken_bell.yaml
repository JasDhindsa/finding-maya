        EVIDENCE SUMMARY - AXIOM TECHNOLOGIES FRAUD

        If you're reading this, something happened to me.

        Everything below is documented with evidence stored in:
        - Google Drive: "Personal Backup - DO NOT DELETE" (shared with marcus.tate.personal@gmail.com)
