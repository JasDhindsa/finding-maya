story:
  id: "maya_chen_investigation"
  title: "The Maya Chen Investigation"
  version: "2.0"
  description: >
    Uncover the truth behind Maya Chen's 'accidental' death. Follow the money,
    the secrets, and the lies. A $47 million corporate fraud. A whistleblower silenced.
    A truth buried beneath a balcony fall. You are Jordan Reeves — and you have two phones.

  # ─────────────────────────────────────────────────────────────────────────────
  # VICTIM PROFILE (used for intro narration and investigation context)
  # ─────────────────────────────────────────────────────────────────────────────
  victimProfile:
    name: "Maya Chen"
    age: 28
    title: "Senior Product Manager"
    employer: "Axiom Technologies"
    employerAddress: "989 Market St, San Francisco, CA"
    homeAddress: "2847 Folsom St, Apt 4B, San Francisco, CA"
    education: "Stanford MBA, Stanford CS '18"
    publicPersona: >
      The rising star. Promoted twice in three years. Frequent speaker at tech
      conferences. 47K followers on LinkedIn. Posted motivational content about
      'authentic leadership' and 'bringing your whole self to work.' Remembered
      birthdays and organized team happy hours.
    privateReality: >
      Drowning in debt from her mother's medical bills. Sleeping four hours a night.
      Taking Adderall bought from a college contact. Maintaining three different
      versions of herself across different social circles, each unaware of the contradictions.
    deathDetails:
      date: "Thursday, November 16th"
      time: "11:47 PM"
      officialCause: "Fall from fourth-floor apartment balcony"
      bloodAlcohol: "0.14%"
      policeNotes: >
        Empty wine bottle, overturned chair, phone on the kitchen counter still unlocked.
        Police classified as accidental death.

  # ─────────────────────────────────────────────────────────────────────────────
  # PLAYER PROFILE
  # ─────────────────────────────────────────────────────────────────────────────
  playerProfile:
    name: "Jordan Reeves"
    age: 27
    relationship: >
      Maya's former college roommate from Stanford. Drifted apart after graduation —
      different cities, different lives — but maintained a comfortable distance: texts on
      birthdays, liking major life updates. Three months ago, Maya reached out. Not the
      polished LinkedIn Maya, but someone who sounded tired. She asked if Jordan
      remembered that promise made sophomore year, drunk on cheap vodka:
      'If either of us ever really fucks up, we call each other first. No judgment.'
      Jordan said of course. Maya never explained what she meant. Jordan hadn't
      heard from her since.

  # ─────────────────────────────────────────────────────────────────────────────
  # PERSONA KNOWLEDGE (what each NPC knows — locked/unlocked)
  # ─────────────────────────────────────────────────────────────────────────────
  personaKnowledge:
    david:
      unlocked:
        - id: "maya_sister_careful"
          text: "Maya was careful. She wouldn't just fall."
        - id: "police_closing_case"
          text: "The police are closing the case. Calling it accidental death."
      locked:
        - id: "dad_proposal_fort_point"
          text: "Maya used to go to Fort Point to think because it's where our dad proposed to our mom."
          unlocksWhen: "player asks David about Fort Point location history"
        - id: "maya_shut_me_out"
          text: "Maya shut me out recently, claiming she didn't want me to worry. We weren't close since Mom got sick."
          unlocksWhen: "player asks David about their relationship"
        - id: "david_finds_flashdrive"
          text: "I found the flash drive behind the baseboard in Maya's closet."
          unlocksWhen: "player instructs David to search the bedroom closet"

    liam:
      unlocked:
        - id: "liam_was_at_apartment"
          text: "Liam says he was at Maya's apartment Thursday night because she called him crying."
        - id: "liam_claims_maya_unstable"
          text: "Liam is claiming Maya was paranoid and experiencing delusions."
        - id: "liam_wants_phone"
          text: "Liam is demanding Maya's phone back, calling it company property."
      locked:
        - id: "liam_is_cfo"
          text: "Liam Keller is actually the CFO of Axiom Technologies — not just a coworker."
          unlocksWhen: "player searches LinkedIn for Liam Keller"
        - id: "liam_rented_car"
          text: "Liam rented a black Tesla Model 3 from Enterprise SFO Thursday at 6 PM. The GPS last pinged at Maya's apartment building at 2:34 AM Friday."
          unlocksWhen: "player accesses deleted photos and finds rental car agreement"
        - id: "liam_involved_fraud"
          text: "Liam co-orchestrated the $47M fraud with James, managing the Cayman island transfers."
          unlocksWhen: "player reads the PROOF note or smoking gun email"
        - id: "liam_signal_threat"
          text: "On Signal, Liam told Maya: 'You're going to destroy everything. I'm coming over.'"
          unlocksWhen: "player opens Signal app and reads Liam's conversation"

    marcus:
      unlocked:
        - id: "marcus_knew_about_james"
          text: "Marcus knew about James's fraud for two weeks before telling Maya."
        - id: "marcus_showed_phone_at_dinner"
          text: "Marcus showed Maya something on his phone at dinner that upset her deeply."
        - id: "marcus_lent_maya_money"
          text: "Marcus lent Maya $2,400. She sent it back the night she died."
      locked:
        - id: "marcus_forensic_accountant"
          text: "Marcus used to work in forensic accounting — he recognized the fraud pattern."
          unlocksWhen: "player reads Venmo history or PROOF note"
        - id: "marcus_has_evidence_copies"
          text: "Marcus has copies of all evidence on Google Drive, shared to his personal Gmail."
          unlocksWhen: "player reads PROOF note"
        - id: "marcus_paid_maya_5000"
          text: "Marcus paid Maya $5,000 for a lawyer retainer the night she died."
          unlocksWhen: "player reads Venmo transaction history"
        - id: "marcus_shown_on_deleted_photo"
          text: "A deleted photo from Flour + Water restaurant shows Marcus's phone displaying: 'Is she going to be a problem? / I'm handling it. / Handle it faster.'"
          unlocksWhen: "player accesses deleted photos album"
        - id: "marcus_original_venmo"
          text: "A deleted screenshot shows Marcus originally paid Maya $2,400 with the note 'For your silence' on November 10th. Maya returned it on November 16th with the note 'I don't want your money.'"
          unlocksWhen: "player accesses deleted photos album"

    priya:
      unlocked:
        - id: "priya_saw_maya_spiral"
          text: "Priya knew Maya was spiraling but didn't know why."
        - id: "priya_suspicious_marcus"
          text: "Priya is suspicious of Marcus and noted he was being weird about Maya leaving dinner."
        - id: "priya_maya_looked_sick"
          text: "Maya looked like she was going to throw up when Marcus showed her something on his phone at dinner."
      locked:
        - id: "priya_maya_refused_help"
          text: "Maya refused to let Priya come over, said she needed to think alone."
          unlocksWhen: "player reads Maya-Priya text thread"
        - id: "priya_last_message"
          text: "Priya's last message to Maya — 'omg just saw. call me when you can' — was sent at 11:51 PM, four minutes after Maya died."
          unlocksWhen: "player reads notification timestamps carefully"

    james:
      unlocked:
        - id: "james_fired_maya"
          text: "James fired Maya via email at 11:08 PM Thursday, calling her complaint inappropriate and libelous."
        - id: "james_put_maya_on_leave"
          text: "James placed Maya on administrative leave at 10:58 PM via Slack."
        - id: "james_denies_fraud"
          text: "James claims Meridian is a legitimate vendor with board-approved consulting arrangements."
      locked:
        - id: "james_smoking_gun_email"
          text: "James sent Liam an email on September 14 confirming $8.2M in a Swiss account and explicitly discussing how to handle Maya: 'She's smart. We need to shut this down before she digs deeper.'"
          unlocksWhen: "player reads smoking gun email in Google Drive"
        - id: "james_controls_shell_companies"
          text: "James controls Helix Solutions Ltd, a Cayman Islands shell company receiving $31.2M in fake consulting payments."
          unlocksWhen: "player reads PROOF note or investigates shell companies"
        - id: "james_personal_swiss_account"
          text: "James has a personal UBS Switzerland account: CH93-0076-2011-6238-5295-7 receiving stolen funds."
          unlocksWhen: "player reads PROOF note"

    unknown_contact:
      unlocked:
        - id: "unknown_knows_truth"
          text: "Unknown Contact claims to know what happened Thursday night and says it wasn't an accident."
        - id: "unknown_told_maya_fort_point"
          text: "Unknown Contact told Maya to go to Fort Point Thursday night, believing she'd be safe there. They were wrong."
        - id: "unknown_knows_about_drive"
          text: "Unknown Contact knows about the deleted photos and the third flash drive hidden at Fort Point."
      locked:
        - id: "unknown_identity"
          text: "Unknown Contact's identity is not yet revealed."
          unlocksWhen: "player progresses to Chapter 3 revelation"

    sophie:
      unlocked:
        - id: "sophie_noticed_tension"
          text: "Sophie noticed tension between Maya and Liam since the quarterly review and said they 'literally can't be in the same room anymore.'"
      locked:
        - id: "sophie_has_invoices"
          text: "Sophie sent Maya a Signal message saying she has copies of the original invoices and knew Maya was right about the transfers."
          unlocksWhen: "player reads Sophie's Signal messages"
        - id: "sophie_scared_of_job"
          text: "Sophie admits she was scared of losing her job and didn't back Maya up in the Meridian channel."
          unlocksWhen: "player reads Sophie's Signal messages"

    rachel_kim:
      unlocked:
        - id: "rachel_gave_lawyer_referral"
          text: "Rachel Kim, Axiom's in-house counsel, gave Maya a referral to whistleblower attorney Sarah Mendoza off the record."
      locked:
        - id: "rachel_warned_maya"
          text: "Rachel warned Maya to 'be smart about how you do it' and prepare for retaliation even if illegal."
          unlocksWhen: "player reads email thread with Rachel"
        - id: "rachel_knows_something"
          text: "Rachel's Friday morning question 'I wasn't informed of any administrative leave' suggests she may be an ally inside Axiom."
          unlocksWhen: "player reads Slack #meridian-project Friday morning messages"

    elena_vasquez:
      locked:
        - id: "elena_helped_create_invoices"
          text: "Elena Vasquez, Finance Director, helped create fake invoices for Meridian. She's scared and might flip."
          unlocksWhen: "player reads PROOF note"

    thomas_wright:
      locked:
        - id: "thomas_received_kickbacks"
          text: "Board member Thomas Wright received $2.1M in kickbacks routed through Apex Consulting Group (Cayman Islands) to a Credit Suisse account."
          unlocksWhen: "player reads PROOF note or Google Drive evidence"
        - id: "thomas_getting_nervous"
          text: "James's smoking gun email says Thomas is 'getting nervous about his cut' — Liam was told to send $500K to keep him quiet."
          unlocksWhen: "player reads smoking gun email"

  # ─────────────────────────────────────────────────────────────────────────────
  # CURRENT OBJECTIVES (shown to player as investigation goals)
  # ─────────────────────────────────────────────────────────────────────────────
  investigationFlow:
    chapter1:
      title: "The Phone"
      dramaticQuestion: "Was Maya unraveling, or was someone tightening the walls around her?"
      playerLoop:
        - "Read the final messages and notifications from the night Maya died."
        - "Notice who sounds worried versus who sounds entitled to Maya's silence."
        - "Find the note Maya left specifically for Jordan."
        - "Follow the memory trail instead of guessing."
      requiredClues:
        - "Liam's escalating texts"
        - "Priya's late timing"
        - "Jordan-specific note"
        - "Boston photo trail"
      payoff: "The player realizes Maya expected retaliation and prepared a deliberate handoff."

    chapter2:
      title: "Follow the Money"
      dramaticQuestion: "Who profited from Maya staying quiet, and who panicked after she stopped?"
      playerLoop:
        - "Unlock the PROOF note and verify Maya's accusations."
        - "Cross-check work evidence against private evidence."
        - "Use deleted material to test whether public stories hold up."
        - "Work out what Liam is trying to recover before he gets it."
      requiredClues:
        - "PROOF note"
        - "Deleted photos"
        - "Public role / identity context"
        - "Google Drive smoking gun"
      payoff: "The player moves from suspicion to confirmation, but the motive web gets murkier."

    chapter3:
      title: "Fort Point"
      dramaticQuestion: "Can Jordan secure the truth before the last clean copy disappears?"
      playerLoop:
        - "Infer where the backups are from Maya's own wording."
        - "Stress-test the timeline for anything staged after death."
        - "Compare who knew what with when they knew it."
        - "Secure evidence before deciding who deserves trust."
      requiredClues:
        - "Insurance-policy note"
        - "Fort Point flash-drive photo"
        - "Uber anomaly"
        - "Closet flash-drive lead"
      payoff: "The player realizes the cover-up is not just financial; the night itself was manipulated."

    chapter4:
      title: "The Choice"
      dramaticQuestion: "How do you make the truth impossible to erase?"
      playerLoop:
        - "Sort evidence by legal weight, survivability, and public impact."
        - "Choose allies and institutions based on risk, speed, and leverage."
      requiredClues:
        - "Attorney trail"
        - "Independent backups"
        - "Smoking gun email"
        - "Timeline contradictions"
      payoff: "The ending reflects whether Jordan learned to think as carefully as Maya did."

  currentObjectives:
    - id: "first_look"
      chapter: 1
      description: "Take in the phone like an investigator: who reached out, who sounds afraid, and who sounds controlling."
      hint: "Start with the loudest voices. The truth is not contained in one app."
      completed: false

    - id: "find_note_to_jordan"
      chapter: 1
      description: "Find whatever Maya left behind for Jordan personally."
      hint: "If Maya planned for failure, she wrote to the one person outside Axiom."
      completed: false

    - id: "mira_password"
      chapter: 1
      description: "Figure out what Maya meant by 'the night we became real friends.'"
      hint: "Treat it as a memory test, not a trivia question. Which shared moment would Jordan instantly feel, not just remember?"
      completed: false

    - id: "unlock_proof_note"
      chapter: 2
      description: "Unlock the 'PROOF - DO NOT DELETE' note without being handed the answer."
      hint: "The key is numeric, personal, and hiding at the end of the Boston trail."
      completed: false

    - id: "investigate_fraud"
      chapter: 2
      description: "Verify Maya's accusation by triangulating the fraud across multiple sources."
      hint: "Look for one work source, one private source, and one backup source that all point to the same scheme."
      completed: false

    - id: "find_deleted_photos"
      chapter: 2
      description: "Recover the evidence Maya almost erased."
      hint: "If someone panicked and removed the ugliest clues in a hurry, where would they still be waiting?"
      completed: false

    - id: "identify_liam"
      chapter: 2
      description: "Work out who Liam really is and why he is panicking."
      hint: "Do not trust how Liam describes himself. Compare his status, his access, and his movement."
      completed: false

    - id: "secure_evidence"
      chapter: 3
      description: "Make sure the case survives even if one copy disappears."
      hint: "Maya did not trust a single hiding place. Read her wording carefully."
      completed: false

    - id: "decide_who_to_trust"
      chapter: 3
      description: "Separate frightened allies from opportunists and liars."
      hint: "The safest person is not always the most honest one. Track knowledge against timing."
      completed: false

    - id: "expose_the_truth"
      chapter: 4
      description: "Choose the path that keeps the evidence alive and makes the truth unavoidable."
      hint: "Legal protection, law enforcement, and public pressure each solve a different problem."
      completed: false

  # ─────────────────────────────────────────────────────────────────────────────
  # INITIAL STATE
