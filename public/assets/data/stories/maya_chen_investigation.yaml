        text: |
          Maya ordered an Uber from Fort Point at 11:58 PM.

          Maya died at 11:47 PM.

          Either the time of death is wrong — or someone used her phone after she died to
          create a false record of her leaving Fort Point safely.

          The Uber arrived at 847 Folsom St at 12:13 AM. Jennifer L., 4.8 stars.

          Was Maya in that car? Or was it empty?
