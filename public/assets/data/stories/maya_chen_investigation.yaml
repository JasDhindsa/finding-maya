        text: "Forty-seven million dollars. Shell companies. Retaliation already underway before she died. Now the rest of Maya's phone matters: work mail, Slack, encrypted chats, money trails, even public profiles. The question isn't whether Maya was silenced. It's who helped do it, and who panicked after."
