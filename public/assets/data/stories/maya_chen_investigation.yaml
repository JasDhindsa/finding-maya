    - id: "act3_fort_point"
      type: "location_event"
      trigger:
        type: "player_goes_to_fort_point"
      content:
        title: "FORT POINT — BENEATH THE GOLDEN GATE BRIDGE"
        text: |
          The wind off the bay is sharp and cold. The bridge looms above you, orange cables disappearing
          into fog. In the distance, the city skyline. Maya was here eleven hours ago.

          You find the western wall. The stones are old, rough, darkened by salt air.

          You count from the left. One stone. Two stones. Three.

          Your fingers find a gap. Something small and plastic, wrapped in waterproof tape.

          You pull it free.

          Flash Drive #3.
      actions:
