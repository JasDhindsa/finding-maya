          label: "Go to the SEC"
          description: "File a formal whistleblower complaint. The SEC has subpoena power. Slower but systematic."
          consequence: "SEC opens investigation. James and Liam are put on notice. Takes months. Thomas Wright may flee."
        - id: "fbi"
          label: "Go to the FBI"
          description: "This is wire fraud, securities fraud, and potentially murder. FBI jurisdiction."
          consequence: "FBI opens investigation. Arrest warrants possible. The fastest path to justice for Maya."
        - id: "attorney"
          label: "Go to Sarah Mendoza"
          description: "Maya already sent Sarah evidence. She's expecting a call. She can coordinate everything."
          consequence: "Sarah files parallel complaints with SEC and FBI. Provides legal protection for Jordan."
        - id: "press"
          label: "Go to the press"
          description: "The SF Chronicle, WSJ. Make it public before Axiom can contain it."
          consequence: "Fastest public exposure. Hardest to bury. But gives James time to flee before arrest."
        - id: "all"
          label: "All of the above"
          description: "Contact Sarah Mendoza, who coordinates SEC and FBI filings simultaneously while you talk to the press."
          consequence: "Maximum coverage. Maximum protection. Maya's preferred outcome."
      next: "act4_epilogue"

    - id: "act4_epilogue_justice"
      type: "epilogue"
      trigger:
        type: "player_chose_all_or_fbi"
      content:
        title: "EPILOGUE"
        text: |
          Six weeks later, James Morrison was arrested at SFO attempting to board a flight
          to the Cayman Islands.

          Liam Keller turned himself in after his attorney negotiated a cooperation agreement.
          His testimony confirmed what Maya had documented — and more.

          Thomas Wright resigned from the Axiom board and settled with the SEC for $4.2M.

          Elena Vasquez cooperated with investigators. She received immunity.

          The FBI opened a murder investigation into Maya's death.

          At 2:34 AM on the night Maya died, Liam Keller's rental car was parked outside
          her apartment building. Phone records place him inside the building.

          The official cause of death was reclassified as "suspicious — under investigation."

          David Chen was there when the detective called. He said only one thing:
          "She told you. She told you it wasn't an accident."

          The case remains open.

          Maya Chen was right.
      next: "credits"

    - id: "credits"
      type: "credits"
      content:
        title: "THE MAYA CHEN INVESTIGATION"
        text: |
          In memory of every person who saw something wrong,
          told the truth,
          and paid for it.

