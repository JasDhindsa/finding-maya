      type: "inner_monologue"
      content:
        text: "Maya buried a flash drive under a stone at Fort Point. 'Nobody knows about #3 except me.' Not Liam. Not Marcus. Just Maya - and now, me. Maps and ride history should tell me how she got there, when she left, and whether that timeline is even real."
