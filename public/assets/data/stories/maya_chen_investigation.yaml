  # ─────────────────────────────────────────────────────────────────────────────
  # EVENTS / NARRATIVE SCRIPT
  # ─────────────────────────────────────────────────────────────────────────────
  events:
    - id: "intro_profile"
      type: "narration"
      trigger:
        type: "auto"
      content:
        title: "MAYA CHEN"
        text: "Maya Chen, 28. Senior Product Manager at Axiom Technologies in San Francisco."
      next: "intro_profile_2"

    - id: "intro_profile_2"
      type: "narration"
      content:
        text: "On paper, she looked untouchable: Stanford MBA, fast promotions, speaking gigs, and thousands of LinkedIn followers."
      next: "intro_profile_3"

    - id: "intro_profile_3"
      type: "narration"
      content:
        text: "She was the rising star. The mentor. The one who remembered birthdays and made other people feel seen."
      next: "intro_profile_4"

    - id: "intro_profile_4"
      type: "narration"
      content:
        text: "Privately, her life was coming apart: debt from her mother's medical bills, almost no sleep, and too many versions of herself to keep straight."
      next: "intro_profile_5"

    - id: "intro_profile_5"
      type: "narration"
      content:
        text: "She died on Thursday, November 16 at 11:47 PM. The police called it an accident: a fall from her fourth-floor balcony after a night of drinking."
      next: "intro_context"

    - id: "intro_context"
      type: "narration"
      content:
        title: "PLAYER-VICTIM RELATIONSHIP"
        text: |
          You're Jordan Reeves, 27, Maya's former college roommate from Stanford.

          You drifted apart after graduation — different cities, different lives — but maintained
          that comfortable distance where you'd text on birthdays and like each other's major
          life updates.

          Three months ago, Maya reached out. Not the polished LinkedIn Maya, but someone who
          sounded tired. She asked if you remembered that promise you'd made sophomore year,
          drunk on cheap vodka: 'If either of us ever really fucks up, we call each other first.
          No judgment.'

          You said of course. She never explained what she meant.

          You hadn't heard from her since.
      next: "intro_call"

    - id: "intro_call"
      type: "narration"
      content:
        text: "The call comes from Maya's brother, David, at 6:47 AM on Friday."
      next: "intro_david_1"

    - id: "intro_david_1"
      type: "narration"
      content:
        text: "\"Jordan? This is... this is David Chen. Maya's brother. I got your number from her phone. I'm sorry to call so early, but—\" His voice cracks. \"Maya died last night.\""
      next: "intro_flight"

    - id: "intro_flight"
      type: "narration"
      content:
        text: "You're on the next flight to San Francisco."
      next: "intro_apartment"

    - id: "intro_apartment"
      type: "narration"
      content:
        text: |
          David meets you at Maya's apartment. He looks like he hasn't slept. The police tape is still up,
          but he has keys — he's listed as her emergency contact.

          The apartment is frozen in that horrible liminal state: half-investigated crime scene,
          half-someone's-actual-life.

          "The police gave me her phone this morning," David says, holding it like it might shatter.
          "They already went through it. Said there was nothing suspicious. Just... texts with friends,
          work emails, normal stuff." He's crying now. "But Maya and I weren't close. Not recently.
          I don't know who these people are. I don't know what's normal for her."

          He hands you the phone. It's in a rose gold case with a crack across the corner.
      next: "intro_david_ask"

    - id: "intro_david_ask"
      type: "narration"
      content:
        text: |
          "You knew her better than I did these last few years. Can you just... look? Tell me if
          anything seems wrong? I keep thinking—" He stops. "The police said she'd been drinking.
          That she was stressed about work. But Maya didn't... she wasn't careless. She wouldn't
          just fall."

          The phone is still unlocked. The battery is at 34%.

          You look at the screen. Seventeen unread messages. Three missed calls. A notification
          from Venmo. Another from a banking app showing a negative balance.

          "I need to know what happened to my sister," David whispers.
      next: "intro_two_phones"

    - id: "intro_two_phones"
      type: "narration"
      content:
        text: |
          You nod. Your own phone buzzes in your pocket — your boss, probably wondering where you are.
          You silence it.

          You have two phones now.

          One belongs to the living.
          One belongs to the dead.
      next: "intro_mission"

    - id: "intro_mission"
      type: "narration"
      content:
        title: "THE OBJECTIVE"
        text: |
          You have her phone. You have her secrets.

          Find the messages from that night.
          Find the truth.
      next: "act1_start"
      actions:
        - type: "set_flag"
          flag: "intro_seen"
          value: true
    - id: "act1_start"
      type: "transition"
      content:
        effect: "fade"
        duration: 2000
        destination: "home_screen"
        title: "CHAPTER 1: THE PHONE"
        subtitle: "Friday, November 17th — 9:08 AM"
      next: "monologue_check_messages"

    - id: "monologue_check_messages"
      type: "inner_monologue"
      content:
