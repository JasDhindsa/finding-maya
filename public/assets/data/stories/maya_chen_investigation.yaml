  # ─────────────────────────────────────────────────────────────────────────────
  # INVESTIGATION HOOKS (for game master / AI game logic reference)
  # ─────────────────────────────────────────────────────────────────────────────
  investigationHooks:
    - id: "liams_last_message"
      title: "Liam's 11:47 PM Slack message"
      description: >
        Liam's Slack DM to Maya ends at exactly 11:47 PM — the time of death.
        His last message: 'From making a mistake you can't take back.'
        The conversation was still active when Maya died.

    - id: "liam_knows_fort_point"
      title: "How did Liam know about Fort Point?"
      description: >
        Liam texted Maya's phone: 'I know you're planning to go to Fort Point. Don't.'
        How? Options: (1) He's remotely accessing Maya's phone, (2) He saw the location history,
        (3) Unknown Contact told him (betrayal?), (4) He read the PROOF note which mentions Fort Point.
        The answer changes everything about who Unknown Contact is.

    - id: "marcus_ambiguity"
      title: "Marcus: ally or threat?"
      description: >
        The deleted photo shows Marcus's phone: 'Is she going to be a problem? / I'm handling it.'
        But Marcus also: paid for her lawyer, helped her build the fraud case, has forensic accounting expertise,
        is cooperating with Jordan. The tension between these facts is the central moral mystery of the game.
        Resolution: 'I'm handling it' referred to Marcus managing the situation by building the evidence case.
        He was protecting Maya, not threatening her. But the player must discover this through trust — not proof.

    - id: "priya_timing"
      title: "Priya's message at 11:51 PM"
      description: >
        'omg just saw. call me when you can' — sent FOUR MINUTES after Maya died.
        What did Priya 'just see'? Answer: A Nextdoor / neighborhood app alert about an incident at
        847 Folsom St. She didn't know it was Maya. She found out from David's call the next morning.
        Priya is innocent. But the timing is always suspicious until explained.

    - id: "uber_anomaly_deep"
      title: "The Uber ordered after death"
      description: >
        Maya's Uber history shows a ride from Fort Point back to her apartment, ordered at 11:58 PM —
        11 minutes after she died. This is either: (1) the official time of death is wrong and she was
        alive until later, (2) someone used her phone to fake a return trip, (3) she had the Uber
        pre-scheduled. The most likely explanation: Liam used her unlocked phone to order the Uber
        to create evidence that Maya returned home safely from Fort Point — making her death look like
        a fall from her own balcony, not a murder at Fort Point.
        If Maya died at Fort Point and Liam moved the body to the apartment, the Uber creates
        a false digital trail. The 12:13 AM arrival timestamp at the Folsom St address matches
        when the body would have been 'staged.'

    - id: "flash_drive_3_stakes"
      title: "Why does the third flash drive matter?"
      description: >
        The Google Drive copy was shared with Marcus — Liam may be able to get it deleted by claiming
        Maya's account should be surrendered to the company.
        The closet flash drive (Drive #1) — Liam searched for it and likely found it.
        The attorney copy (Sarah Mendoza) — protected but narrow.
        The Fort Point flash drive (Drive #3) is the only complete, independent, unknown copy.
        It is the key to the entire case.

    - id: "unknown_identity_mystery"
      title: "Who is Unknown Contact?"
      description: >
        Unknown Contact: (1) told Maya to go to Fort Point, (2) knew about the deleted photos,
        (3) warned Maya about Axiom network monitoring, (4) knew Liam was CFO, (5) received the
        Signal message chain.
        Candidate A: Elena Vasquez (Finance Director) — scared, knows everything, might flip.
        Candidate B: Rachel Kim (Legal) — gave Maya the lawyer referral, said 'be careful.'
        Candidate C: David Park (Engineering Lead) — flagged the fake invoice, inside knowledge.
        Candidate D: Someone from outside Axiom — a previous fraud victim, a journalist, an SEC contact.
        Intended reveal: Rachel Kim. She couldn't help officially but secretly guided Maya every step.
        She is Unknown Contact. The attorney referral, the warnings, the Signal messages — all Rachel.
        She was terrified of what she knew. She's still terrified. But she couldn't let Maya die for nothing.

  # ─────────────────────────────────────────────────────────────────────────────
  # GAME MECHANICS REFERENCE
  # ─────────────────────────────────────────────────────────────────────────────
  gameMechanics:
    chapters:
      - id: 1
        title: "The Phone"
        objective: "Orient yourself. Read the messages. Find Maya's note to Jordan."
        keyDiscoveries:
          - "17 unread messages — Liam's desperation, Priya's 11:51 PM message"
          - "Venmo $2,400 payment — Marcus loan repayment"
          - "Chase low balance alert — Maya was broke"
          - "Things to tell Jordan note — Maya's message to you"
          - "Boston Marathon photos — password puzzle"
        estimatedPlayTime: "20-30 minutes"

      - id: 2
        title: "Follow the Money"
        objective: "Unlock the PROOF note. Investigate the fraud. Survive Liam's visit."
        keyDiscoveries:
          - "PROOF note unlocked (password: 041642)"
          - "Deleted photos — rental car, Marcus's phone, hush money Venmo"
          - "LinkedIn — Liam is CFO"
          - "Enterprise GPS — Liam's car at Maya's building at 2:34 AM"
          - "Google Drive — smoking gun email"
          - "Slack #meridian-project — Liam's 11:47 PM message"
          - "Signal M thread — Marcus confirms $100M+"
          - "Unknown Contact warns about deleted photos"
        estimatedPlayTime: "40-60 minutes"

      - id: 3
        title: "Fort Point"
        objective: "Secure all three copies of evidence. Navigate Liam's escalating threats."
        keyDiscoveries:
          - "Flash drive #1 secured (David finds it in closet)"
          - "Flash drive #3 hidden at Fort Point — third stone, western wall"
          - "Uber anomaly — ride ordered 11 minutes after death"
          - "Liam's rental car GPS — at apartment 2:34 AM"
          - "Liam's 'Not anymore' group chat message — sent 10 minutes after Maya died"
        estimatedPlayTime: "30-40 minutes"

      - id: 4
        title: "The Choice"
        objective: "Decide how to bring the evidence forward. Who do you trust? Where do you go?"
        keyDecisions:
          - "Contact Sarah Mendoza (attorney)"
          - "File with the SEC"
          - "Contact the FBI"
          - "Go to the press"
        estimatedPlayTime: "15-20 minutes"

    totalEstimatedPlayTime: "105-150 minutes (first playthrough)"
    replayValue: >
      Multiple decision branches create different experiences:
      - Letting Liam in vs. keeping him out changes Chapter 2 pacing
      - Trusting Marcus early vs. late changes the emotional arc
      - How Jordan responds to Liam on Maya's phone creates different confrontation paths
      - The final chapter offers 4+ ending variations based on who Jordan contacts

    passwordPuzzle:
      notes: >
        Only one password puzzle is required to complete the main story (PROOF note: 041642).
        The Passwords & Logins note has a different password (library/dorm lockout incident)
        and is optional — it contains backup credentials but no new story-critical information.
        The Chase banking app requires Face ID and is permanently locked in the base game.

    evidenceTracker:
