        title: "VICTIM PROFILE"
        text: "Maya Chen, 28. Senior Product Manager at Axiom Technologies. Maya projected an image of effortless success: Stanford MBA, 47K followers on LinkedIn, a rising star. Privately: Drowning in debt, sleeping four hours a night, and maintaining three different versions of herself. She died on Thursday, November 16th, at 11:47 PM. Official cause: fall from her fourth floor apartment balcony."
