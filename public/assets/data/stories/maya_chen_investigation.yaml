  # ─────────────────────────────────────────────────────────────────────────────
  # CONTACTS — PLAYER PHONE
  # ─────────────────────────────────────────────────────────────────────────────
  conversationRules:
    david:
      enabled: true
      channels:
        - "Messages"
      stages:
        - id: "warning_and_context"
          guidance: "Keep David anchored to what Maya left behind. He needs enough truth to help, not a full theory all at once."
          completionObjective: "The player tells David Maya left a message, says Maya was scared, or says her death may not have been an accident."
          playerShouldKnow:
            - "David is grieving but receptive if Jordan is direct."
            - "David already doubts the police conclusion."
        - id: "liam_at_the_door"
          requiredFlags:
            - "liam_arrives_at_apartment"
          guidance: "David needs a concrete instruction about Liam right now: keep him out, stall him, or press him for specifics."
          completionObjective: "The player clearly tells David to let Liam in, keep Liam out, stall him, or ask Liam what he wants."
          playerShouldKnow:
            - "Liam is actively trying to regain access to Maya's apartment and phone."
            - "David will follow Jordan if Jordan sounds certain."
        - id: "secure_the_closet_backup"
          requiredFlags:
            - "proof_note_unlocked"
          guidance: "Use David for one practical thing: protect the apartment and retrieve the closet flash drive before Liam gets it."
          completionObjective: "The player tells David to search Maya's closet, secure the flash drive, or stop anyone from taking evidence."
          playerShouldKnow:
            - "David can physically secure evidence Jordan cannot reach."
            - "The apartment itself is now part of the crime scene."
        - id: "hold_the_line"
          requiredFlags:
            - "flash_drive_1_secured"
          guidance: "David has what he needs for now. Keep him focused on protecting the apartment and not yielding to Axiom pressure."
          completionObjective: "The player tells David to hold the flash drive, keep Axiom out, or wait before trusting the wrong authorities."
          playerShouldKnow:
            - "David understands Maya was targeted because of what she found."
            - "David's role is to preserve evidence, not improvise."
          closeThreadAfterCompletion: true

    liam:
      enabled: true
      threadId: "liam_messages"
      channels:
        - "Messages"
      stages:
        - id: "liam_pressure_campaign"
          guidance: "Liam is trying to identify who has the phone and get the evidence back without confessing. Push on motive, not insults."
          completionObjective: "The player accuses Liam of hiding something, asks why he needs Maya's phone, or challenges his story about helping Maya."
          playerShouldKnow:
            - "Liam cares more about recovering evidence than mourning Maya."
            - "His main tactic is to frame Maya as unstable."
        - id: "liam_role_exposed"
          requiredFlags:
            - "liam_identified_as_cfo"
          guidance: "Now that Liam's status is clear, force him to explain why the CFO is personally scrambling for files and a dead coworker's phone."
          completionObjective: "The player mentions Liam being CFO, asks why a CFO is handling this personally, or questions his control over Axiom's money."
          playerShouldKnow:
            - "Liam had both authority and access inside Axiom."
            - "The 'concerned coworker' mask is false."
        - id: "liam_timeline_pressure"
          requiredFlags:
            - "deleted_photos_found"
          guidance: "Use evidence, not bluffing. The rental car, deleted photos, and Fort Point knowledge are the pressure points."
          completionObjective: "The player mentions the rental car, GPS ping, deleted photos, or asks how Liam knew about Fort Point."
          playerShouldKnow:
            - "Liam's movements after Maya's death do not match his story."
            - "Liam knows too much about Maya's backups to be innocent."
          closeThreadAfterCompletion: true

    priya:
      enabled: true
      threadId: "priya_messages"
      channels:
        - "Messages"
      stages:
        - id: "dinner_context"
          guidance: "Priya gives emotional and observational context, not forensic proof. Ask about dinner, Maya's mood, and Marcus."
          completionObjective: "The player asks Priya what happened at dinner, what Marcus showed Maya, or how Maya seemed that night."
          playerShouldKnow:
            - "Priya saw Maya panic in real time."
            - "Priya noticed Marcus acting strangely but does not know the fraud details."
        - id: "late_text_explained"
          guidance: "Clarify the 11:51 PM text so the player can rule Priya in or out for the right reasons."
          completionObjective: "The player asks what Priya meant by 'just saw', asks where she was, or asks if she knew Maya was already dead."
          playerShouldKnow:
            - "Priya texted after seeing a neighborhood alert, not because she was present at the apartment."
            - "Priya is frightened and guilty, not deceptive."
          closeThreadAfterCompletion: true

    marcus:
      enabled: true
      threadId: "marcus_messages"
      channels:
        - "Messages"
      stages:
        - id: "marcus_ambiguity"
          requiredFlags:
            - "liam_arrives_at_apartment"
          guidance: "Marcus is useful but not clean. Test whether he was helping Maya or managing fallout."
          completionObjective: "The player asks Marcus what he knows, why he showed Maya the phone, or why he knew Liam was searching for something."
          playerShouldKnow:
            - "Marcus knew about the fraud before Maya fully did."
            - "Marcus is either an ally with terrible optics or part of the cleanup."
        - id: "marcus_evidence_role"
          requiredFlags:
            - "proof_note_unlocked"
          guidance: "Push Marcus to explain his role in the evidence trail without letting him rewrite the past."
          completionObjective: "The player mentions the Google Drive backup, the lawyer money, his forensic accounting background, or asks whether Maya shared evidence with him."
          playerShouldKnow:
            - "Marcus helped Maya build the case."
            - "Marcus had access to backups and financial context before Jordan did."
        - id: "marcus_deleted_photo"
          requiredFlags:
            - "deleted_photos_found"
          guidance: "Confront the deleted dinner photo directly. Marcus has to explain the 'I'm handling it' message."
          completionObjective: "The player asks about the deleted photo, quotes 'I'm handling it', or asks who wanted Maya handled faster."
          playerShouldKnow:
            - "Marcus must account for the most suspicious-looking evidence tied to him."
            - "His explanation determines whether he reads as ally, coward, or threat."
          closeThreadAfterCompletion: true

    unknown_contact:
      enabled: true
      threadId: "player_unknown"
      channels:
        - "Messages"
      stages:
        - id: "trust_test"
          guidance: "Unknown Contact will not reveal their identity yet. Make them prove proximity to Maya without giving them blind trust."
          completionObjective: "The player asks who they are, why Maya trusted them, or how they know Thursday night was not an accident."
          playerShouldKnow:
            - "Unknown Contact had direct communication with Maya before she died."
            - "They are withholding identity, but not operating randomly."
        - id: "deleted_photos_and_liam"
          requiredFlags:
            - "liam_arrives_at_apartment"
          guidance: "Unknown Contact can point Jordan toward deleted photos and explain why Liam wants the phone so badly."
          completionObjective: "The player asks about deleted photos, asks why Liam wants the phone, or asks what leverage Jordan still has."
          playerShouldKnow:
            - "Deleted photos matter because Maya panicked but kept backups."
            - "Liam is trying to destroy or recover evidence."
        - id: "fort_point_push"
          requiredFlags:
            - "proof_note_unlocked"
          guidance: "Unknown Contact should push hard toward Fort Point, but still refuse the full identity reveal."
          completionObjective: "The player asks what is at Fort Point, why Maya went there, or whether the third flash drive is real."
          playerShouldKnow:
            - "There is a third copy at Fort Point."
            - "Unknown Contact sent Maya there and feels responsible for what happened next."
          closeThreadAfterCompletion: true

