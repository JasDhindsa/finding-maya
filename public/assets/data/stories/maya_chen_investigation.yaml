        subtitle: "You have everything Maya fought to protect. What do you do with it?"
      next: "act4_decision"

    - id: "act4_decision"
      type: "major_decision"
      content:
        title: "WHO DO YOU TRUST? WHERE DO YOU GO?"
        text: |
          You have three copies of Maya's evidence. You know what James and Liam did.
          You know Liam was at her apartment the night she died.
          You know the police called it an accident.

          Maya left you a roadmap.

          What do you do?
