    - id: "intro_context"
      type: "narration"
      content:
        title: "RELATIONSHIP CONTEXT"
        text: "You're Jordan Reeves, 27, Maya's former college roommate. You drifted apart after graduation, but three months ago, Maya reached out. She asked if you remembered the promise you made sophomore year: 'If either of us ever really fucks up, we call each other first. No judgment.' You hadn't heard from her since."
      next: "intro_1"

    - id: "intro_1"
      type: "narration"
      content:
        text: "The call comes from Maya's brother, David, at 6:47 AM on Friday."
      next: "intro_2"

    - id: "intro_2"
      type: "narration"
      content:
        text: "\"Jordan? This is... this is David Chen. Maya's brother. I got your number from her phone. I'm sorry to call so early, but—\" His voice cracks. \"Maya died last night.\""
      next: "intro_3"

    - id: "intro_3"
      type: "narration"
      content:
        text: "You're on the next flight to San Francisco."
      next: "intro_4"

    - id: "intro_4"
      type: "narration"
      content:
        text: "\"You knew her better than I did these last few years. Can you just... look? Tell me if anything seems wrong?\""
      next: "intro_5"

